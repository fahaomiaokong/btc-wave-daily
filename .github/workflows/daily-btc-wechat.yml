name: Daily BTC WeCom Push

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. 00:30 UTC = 08:30 Beijing time.
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  daily-btc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report and push to WeCom
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib
        run: python scripts/daily_btc_push.py

      - name: Commit generated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily BTC wave report"
          file_pattern: reports/charts/*.png reports/posts/*.md reports/data/*.json
